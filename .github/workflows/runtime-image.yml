name: Runtime CI

on:
  pull_request:
    paths:
      - "runtime/**"
      - "scripts/runtime-health.sh"
      - "CLAUDE.md"
      - ".github/workflows/runtime-image.yml"
  push:
    branches:
      - main
    paths:
      - "runtime/**"
      - "scripts/runtime-health.sh"
      - "CLAUDE.md"
      - ".github/workflows/runtime-image.yml"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync runtime dependencies
        run: uv sync --directory runtime --frozen --extra dev

      - name: Run runtime health checks
        run: bash scripts/runtime-health.sh

  build:
    needs: health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        run: docker build -f runtime/Dockerfile -t polymarket-alert-bot:ci runtime
